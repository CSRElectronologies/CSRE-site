name: CSRE webpage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.9
      HUGO_ENVIRONMENT: production
      TZ: asia/kolkata

    steps:
      # Install Hugo CLI
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # Install Dart Sass if required
      - name: Install Dart Sass
        run: sudo snap install dart-sass

      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Enable GitHub Pages (important for new repos)
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install TailwindCSS and other dependencies
      - name: Install Node.js dependencies
        run: npm install

      # Restore Hugo cache
      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: |
            hugo-

      # Optional: Git configuration
      - name: Configure Git
        run: git config core.quotepath false

      # IndexNow: key file must exist on the live host at https://<host>/<key>.txt
      # Secrets: INDEXNOW_KEY (required). Optional: INDEXNOW_HOST (e.g. csre.in) — or repo variable INDEXNOW_HOST.
      - name: Write IndexNow key file
        if: ${{ secrets.INDEXNOW_KEY != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$INDEXNOW_KEY" > "static/${INDEXNOW_KEY}.txt"

      # Build Hugo site
      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      # Notify search engines (Bing, etc.) after a successful build
      - name: IndexNow submit (from sitemap)
        if: ${{ secrets.INDEXNOW_KEY != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: ${{ secrets.INDEXNOW_HOST || vars.INDEXNOW_HOST }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from urllib.parse import urlparse

          key = os.environ["INDEXNOW_KEY"]
          host = (os.environ.get("INDEXNOW_HOST") or "csre.in").strip().lower() or "csre.in"
          scheme_host = f"https://{host}"

          xml = open("public/sitemap.xml", encoding="utf-8").read()
          raw = re.findall(r"<loc>([^<]+)</loc>", xml)
          urls = []
          for u in raw:
              p = urlparse(u.strip())
              path = p.path or "/"
              q = f"?{p.query}" if p.query else ""
              urls.append(f"{scheme_host}{path}{q}")

          payload = {
              "host": host,
              "key": key,
              "keyLocation": f"{scheme_host}/{key}.txt",
              "urlList": urls,
          }
          body = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=body,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  print("IndexNow HTTP", resp.status)
          except urllib.error.HTTPError as e:
              print("IndexNow HTTP error:", e.code, e.read().decode("utf-8", errors="replace"))
              raise

          print("Submitted", len(urls), "URLs to IndexNow for host", host)
          PY

      # Save cache
      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      # Upload the site output for deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
