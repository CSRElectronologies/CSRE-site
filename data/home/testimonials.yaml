title: "Testimonials"

featured:
  image: "images/testimonials-awards.png"
  text: "We received an excellent production-grade home automation product, developed from concept to a fully scalable solution. The support and development process was smooth, and our entire workflow is now perfectly streamlined. Great service by the team at CSR Electronologies!"
  client: "CEO - PAT IoT Solutions"

items:
  - text: "CSR Electronologies transformed our idea into a fully functional SpO₂ and Heart Rate Monitor device with BLE connectivity. The accuracy, reliability, and speed of delivery were outstanding. Their technical expertise in medical-grade hardware and firmware made the product launch seamless."
    client: "An Medical Device OEM"

  - text: "CSR Electronologies delivered a state-of-the-art Electronics Lab setup with modern all-in-one test benches and complete soldering/desoldering workstations. The lab has significantly improved students’ hands-on skills in circuit design, prototyping, and testing."
    client: "KITS Warangal"

  - text: "CSR Electronologies engineered a highly efficient automatic electrolyte temperature monitoring and water-cooled charging system for our lead-acid battery production line. The setup manages 72 tubs in parallel and has drastically improved charging efficiency while eliminating QC issues at the end of production."
    # client: "Manager(IoT) "
    client: "Amara Raja Batteries Ltd"

